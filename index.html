<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.calendar {
    width: 900px;
    height: 600px;
    background: #020617;
    border-radius: 20px;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    gap: 10px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
}

/* COLUMNA DÍA */
.day {
    flex: 1;
    background: #020617;
    border-radius: 12px;
    padding: 10px;
    position: relative;
}

/* TÍTULO */
.day-title {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 10px;
    font-size: 13px;
}

/* GRID HORARIO */
.grid {
    position: relative;
    height: 100%;
    border-left: 1px solid #1e293b;
}

/* LÍNEAS DE HORA */
.hour-line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: #1e293b;
}

/* BLOQUES */
.event {
    position: absolute;
    left: 5px;
    right: 5px;
    border-radius: 10px;
    padding: 6px;
    font-size: 11px;
    color: white;
    overflow: hidden;
}

/* COLORES */
.handball { background: #2563eb; }
.clase { background: #16a34a; }
.profe { background: #ffffff; color: black; }

/* TEXTO */
.event-title {
    font-weight: 500;
    font-size: 11px;
}

.event-time {
    font-size: 10px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="calendar">

    <!-- LUNES -->
    <div class="day">
        <div class="day-title">Lunes</div>
        <div class="grid">

            <!-- 16:00–17:30 -->
            <div class="event handball" style="top: 160px; height: 90px;">
                <div class="event-title">Handball</div>
                <div class="event-time">16:00 – 17:30</div>
            </div>

            <!-- 20:10–23:00 -->
            <div class="event clase" style="top: 250px; height: 170px;">
                <div class="event-title">Historia</div>
                <div class="event-time">20:10 – 23:00</div>
            </div>

        </div>
    </div>

    <!-- MARTES -->
    <div class="day">
        <div class="day-title">Martes</div>
        <div class="grid">

            <div class="event profe" style="top: 200px; height: 60px;">
                <div class="event-title">Profe</div>
            </div>

        </div>
    </div>

    <!-- MIÉRCOLES -->
    <div class="day">
        <div class="day-title">Miércoles</div>
        <div class="grid">

            <div class="event handball" style="top: 220px; height: 90px;">
                <div class="event-title">Handball</div>
                <div class="event-time">19:00 – 20:30</div>
            </div>

            <div class="event clase" style="top: 300px; height: 120px;">
                <div class="event-title">UDI</div>
                <div class="event-time">21:00 – 23:00</div>
            </div>

        </div>
    </div>

    <!-- JUEVES -->
    <div class="day">
        <div class="day-title">Jueves</div>
        <div class="grid">

            <div class="event profe" style="top: 200px; height: 60px;">
                <div class="event-title">Profe</div>
            </div>

        </div>
    </div>

    <!-- VIERNES -->
    <div class="day">
        <div class="day-title">Viernes</div>
        <div class="grid">

            <div class="event handball" style="top: 160px; height: 90px;">
                <div class="event-title">Handball</div>
                <div class="event-time">16:00 – 17:30</div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
