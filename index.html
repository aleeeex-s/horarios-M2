<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda Smartwatch</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: black;
}

/* SIDEBAR RELOJ */
.sidebar {
    width: 280px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: #000;
    color: white;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
}

/* HORA */
.clock {
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 5px;
}

.day {
    color: #888;
    margin-bottom: 20px;
}

/* SECCIÓN */
.section-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

/* EVENTO ACTUAL */
.current {
    background: #1f2937;
    padding: 12px;
    border-radius: 14px;
    margin-bottom: 20px;
}

.current .name {
    font-size: 14px;
    font-weight: 500;
}

.current .time {
    font-size: 12px;
    color: #aaa;
}

/* LISTA */
.event {
    display: flex;
    flex-direction: column;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: #111;
}

.event.handball { border-left: 4px solid #2563eb; }
.event.clase { border-left: 4px solid #16a34a; }
.event.profe { border-left: 4px solid #fff; }

.event .name {
    font-size: 13px;
}

.event .time {
    font-size: 11px;
    color: #888;
}

/* MAIN OPCIONAL */
.main {
    margin-left: 280px;
    padding: 30px;
    color: white;
}
</style>
</head>

<body>

<div class="sidebar">

    <!-- HORA -->
    <div class="clock" id="clock">00:00</div>
    <div class="day" id="day">Lunes</div>

    <!-- ACTUAL -->
    <div class="section-title">AHORA</div>
    <div class="current">
        <div class="name">Prácticas Handball</div>
        <div class="time">16:00 – 17:30</div>
    </div>

    <!-- SIGUIENTE -->
    <div class="section-title">SIGUIENTE</div>

    <div class="event clase">
        <div class="name">Historia de las Ideas</div>
        <div class="time">20:10 – 23:00</div>
    </div>

    <div class="event profe">
        <div class="name">Profe de Handball</div>
        <div class="time">Martes</div>
    </div>

</div>

<div class="main">
    <h1>Modo reloj inteligente</h1>
    <p>Esto es opcional. Podés borrarlo.</p>
</div>

<script>
// RELOJ EN VIVO
function updateClock() {
    const now = new Date();

    let hours = now.getHours().toString().padStart(2, '0');
    let minutes = now.getMinutes().toString().padStart(2, '0');

    document.getElementById("clock").textContent = `${hours}:${minutes}`;

    const days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    document.getElementById("day").textContent = days[now.getDay()];
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
