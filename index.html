<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR APP */
.app {
    width: 360px;
    height: 640px;
    background: #020617;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 20px;
    font-size: 20px;
    font-weight: 600;
    color: white;
}

/* SCROLL */
.content {
    padding: 15px;
    overflow-y: auto;
}

/* DÍA */
.day {
    margin-bottom: 20px;
}

.day-title {
    color: #64748b;
    font-size: 13px;
    margin-bottom: 8px;
    text-transform: uppercase;
}

/* CARD */
.card {
    background: #111827;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* EVENTO */
.event {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* IZQUIERDA */
.event-left {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* ICONO */
.event img {
    width: 18px;
    height: 18px;
    border-radius: 4px;
}

/* TEXTO */
.event-name {
    color: white;
    font-size: 14px;
}

/* HORA */
.event-time {
    font-size: 12px;
    color: #9ca3af;
}

/* COLORES LATERALES */
.handball { border-left: 4px solid #2563eb; }
.clase { border-left: 4px solid #16a34a; }
.profe { border-left: 4px solid #ffffff; }

</style>
</head>

<body>

<div class="app">

    <div class="header">Agenda</div>

    <div class="content">

        <!-- LUNES -->
        <div class="day">
            <div class="day-title">Lunes</div>

            <div class="card handball">
                <div class="event">
                    <div class="event-left">
                        <img src="handball.png">
                        <div class="event-name">Prácticas Handball - ESTADIO</div>
                    </div>
                    <div class="event-time">16:00 – 17:30</div>
                </div>
            </div>

            <div class="card clase">
                <div class="event">
                    <div class="event-left">
                        <img src="clases.png">
                        <div class="event-name">Clase: Historia de las Ideas</div>
                    </div>
                    <div class="event-time">20:10 – 23:00</div>
                </div>
            </div>
        </div>

        <!-- MARTES -->
        <div class="day">
            <div class="day-title">Martes</div>

            <div class="card profe">
                <div class="event">
                    <div class="event-left">
                        <img src="handballprofe.jpg">
                        <div class="event-name">Profe de Handball</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MIÉRCOLES -->
        <div class="day">
            <div class="day-title">Miércoles</div>

            <div class="card handball">
                <div class="event">
                    <div class="event-left">
                        <img src="handball.png">
                        <div class="event-name">Prácticas Handball - ESTADIO</div>
                    </div>
                    <div class="event-time">19:00 – 20:30</div>
                </div>
            </div>

            <div class="card clase">
                <div class="event">
                    <div class="event-left">
                        <img src="clases.png">
                        <div class="event-name">Clase: UDI</div>
                    </div>
                    <div class="event-time">21:00 – 23:00</div>
                </div>
            </div>
        </div>

        <!-- JUEVES -->
        <div class="day">
            <div class="day-title">Jueves</div>

            <div class="card profe">
                <div class="event">
                    <div class="event-left">
                        <img src="handballprofe.jpg">
                        <div class="event-name">Profe de Handball</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VIERNES -->
        <div class="day">
            <div class="day-title">Viernes</div>

            <div class="card handball">
                <div class="event">
                    <div class="event-left">
                        <img src="handball.png">
                        <div class="event-name">Prácticas Handball - ESTADIO</div>
                    </div>
                    <div class="event-time">16:00 – 17:30</div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
