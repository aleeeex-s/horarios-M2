<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda Smartwatch</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR RELOJ */
.watch {
    width: 260px;
    height: 520px;
    background: #000;
    border-radius: 40px;
    padding: 20px;
    box-sizing: border-box;
    box-shadow: 0 0 60px rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* SCROLL */
.content {
    overflow-y: auto;
}

/* DÍA */
.day {
    margin-bottom: 20px;
}

.day-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* EVENTO */
.event {
    background: #111;
    border-radius: 16px;
    padding: 10px;
    margin-bottom: 8px;
}

/* COLORES */
.event.handball {
    border-left: 4px solid #2563eb;
}

.event.clase {
    border-left: 4px solid #16a34a;
}

.event.profe {
    border-left: 4px solid #fff;
}

/* TEXTO */
.event-title {
    font-size: 13px;
    margin-bottom: 4px;
}

.event-time {
    font-size: 11px;
    color: #888;
}

/* IMAGEN */
.event img {
    width: 16px;
    height: 16px;
    margin-right: 6px;
    vertical-align: middle;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="watch">

    <div class="content">

        <div class="day">
            <div class="day-name">Lunes</div>

            <div class="event handball">
                <div class="event-title">
                    <img src="handball.png">
                    Prácticas Handball - ESTADIO
                </div>
                <div class="event-time">16:00 – 17:30</div>
            </div>

            <div class="event clase">
                <div class="event-title">
                    <img src="clases.png">
                    Clase: Historia de las Ideas
                </div>
                <div class="event-time">20:10 – 23:00</div>
            </div>
        </div>

        <div class="day">
            <div class="day-name">Martes</div>

            <div class="event profe">
                <div class="event-title">
                    <img src="handballprofe.jpg">
                    Profe de Handball
                </div>
            </div>
        </div>

        <div class="day">
            <div class="day-name">Miércoles</div>

            <div class="event handball">
                <div class="event-title">
                    <img src="handball.png">
                    Prácticas Handball - ESTADIO
                </div>
                <div class="event-time">19:00 – 20:30</div>
            </div>

            <div class="event clase">
                <div class="event-title">
                    <img src="clases.png">
                    Clase: UDI
                </div>
                <div class="event-time">21:00 – 23:00</div>
            </div>
        </div>

        <div class="day">
            <div class="day-name">Jueves</div>

            <div class="event profe">
                <div class="event-title">
                    <img src="handballprofe.jpg">
                    Profe de Handball
                </div>
            </div>
        </div>

        <div class="day">
            <div class="day-name">Viernes</div>

            <div class="event handball">
                <div class="event-title">
                    <img src="handball.png">
                    Prácticas Handball - ESTADIO
                </div>
                <div class="event-time">16:00 – 17:30</div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
