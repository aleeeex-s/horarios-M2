<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda Sidebar</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 320px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(28,28,30,0.95);
    box-shadow: 10px 0 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 12px;
    background: rgba(50,50,52,0.8);
}

.dots {
    display: flex;
    gap: 8px;
    margin-right: 10px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red { background: #ff5f57; }
.yellow { background: #febc2e; }
.green { background: #28c840; }

.title {
    color: #ccc;
    font-size: 14px;
}

/* CONTENT */
.content {
    padding: 15px;
    overflow-y: auto;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
    color: #e5e5e7;
    font-size: 13px;
}

th {
    text-align: left;
    font-weight: 500;
    color: #a1a1aa;
    padding-bottom: 10px;
}

td {
    padding: 10px 6px;
    vertical-align: top;
}

tr:hover td {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
}

td:first-child {
    color: #71717a;
    width: 90px;
    font-weight: 500;
}

/* ITEM */
.item {
    margin-bottom: 6px;
}

/* BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    border-radius: 8px;
    font-size: 12px;
}

/* LOGO */
.badge img {
    width: 14px;
    height: 14px;
    border-radius: 4px;
}

/* COLORES */
.handball { background: #2563eb; }
.clase { background: #16a34a; }
.profe { background: #ffffff; color: #000; }

/* HORA */
.hora {
    color: #a1a1aa;
    font-size: 11px;
    margin-left: 4px;
}

/* CONTENIDO PRINCIPAL (opcional) */
.main {
    margin-left: 320px;
    padding: 30px;
    color: white;
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="title">Agenda</div>
    </div>

    <div class="content">
        <table>
            <tr>
                <th>Día</th>
                <th>Actividades</th>
            </tr>

            <tr>
                <td>Lunes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Historia
                        </span>
                        <span class="hora">20:10 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Martes</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Miércoles</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas
                        </span>
                        <span class="hora">19:00 – 20:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            UDI
                        </span>
                        <span class="hora">21:00 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Jueves</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Viernes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                </td>
            </tr>

        </table>
    </div>

</div>

<!-- CONTENIDO OPCIONAL -->
<div class="main">
    <h1>Contenido principal</h1>
    <p>Acá podés poner lo que quieras (o dejarlo vacío si es solo agenda).</p>
</div>

</body>
</html>
