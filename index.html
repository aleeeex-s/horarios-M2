<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
}

/* BOTÓN */
.toggle-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2c2c2e;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 1000;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    right: -750px; /* oculto */
    width: 700px;
    height: 100vh;
    transition: 0.4s;
    z-index: 999;
}

/* CUANDO ESTÁ ABIERTO */
.sidebar.active {
    right: 0;
}

/* TU VENTANA ORIGINAL */
.window {
    width: 100%;
    height: 100%;
    border-radius: 0;
    overflow: hidden;
    box-shadow: -20px 0 50px rgba(0,0,0,0.5);
    background: rgba(28,28,30,0.95);
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: rgba(50,50,52,0.8);
}

.dots {
    display: flex;
    gap: 8px;
    margin-right: 10px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red { background: #ff5f57; }
.yellow { background: #febc2e; }
.green { background: #28c840; }

.title {
    color: #ccc;
    font-size: 14px;
}

.content {
    padding: 20px;
    overflow-y: auto;
    height: calc(100vh - 40px);
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
    color: #e5e5e7;
}

th {
    text-align: left;
    font-weight: 500;
    color: #a1a1aa;
    padding-bottom: 10px;
}

td {
    padding: 12px 8px;
    vertical-align: top;
}

tr:hover td {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
}

td:first-child {
    color: #71717a;
    width: 120px;
    font-weight: 500;
}

/* ITEM */
.item {
    margin-bottom: 8px;
}

/* BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
}

/* LOGO */
.badge img {
    width: 16px;
    height: 16px;
    border-radius: 4px;
}

/* COLORES */
.handball { background: #2563eb; }
.clase { background: #16a34a; }
.profe { background: #ffffff; color: #000; }

.hora {
    color: #a1a1aa;
    font-size: 12px;
    margin-left: 6px;
}

</style>
</head>

<body>

<!-- BOTÓN -->
<button class="toggle-btn" onclick="toggleSidebar()">Agenda</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="window">

        <div class="header">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title">Agenda</div>
        </div>

        <div class="content">
            <table>
                <tr>
                    <th>Día</th>
                    <th>Actividades</th>
                </tr>

                <tr>
                    <td>Lunes</td>
                    <td>
                        <div class="item">
                            <span class="badge handball">
                                <img src="handball.png">
                                Prácticas Handball - ESTADIO
                            </span>
                            <span class="hora">16:00 – 17:30</span>
                        </div>
                        <div class="item">
                            <span class="badge clase">
                                <img src="clases.png">
                                Clase: Historia de las Ideas
                            </span>
                            <span class="hora">20:10 – 23:00</span>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>Martes</td>
                    <td>
                        <div class="item">
                            <span class="badge profe">
                                <img src="handballprofe.jpg">
                                Profe de Handball
                            </span>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>Miércoles</td>
                    <td>
                        <div class="item">
                            <span class="badge handball">
                                <img src="handball.png">
                                Prácticas Handball - ESTADIO
                            </span>
                            <span class="hora">19:00 – 20:30</span>
                        </div>
                        <div class="item">
                            <span class="badge clase">
                                <img src="clases.png">
                                Clase: UDI
                            </span>
                            <span class="hora">21:00 – 23:00</span>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>Jueves</td>
                    <td>
                        <div class="item">
                            <span class="badge profe">
                                <img src="handballprofe.jpg">
                                Profe de Handball
                            </span>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td>Viernes</td>
                    <td>
                        <div class="item">
                            <span class="badge handball">
                                <img src="handball.png">
                                Prácticas Handball - ESTADIO
                            </span>
                            <span class="hora">16:00 – 17:30</span>
                        </div>
                    </td>
                </tr>

            </table>
        </div>

    </div>

</div>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
