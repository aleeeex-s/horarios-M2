<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.window {
    width: 700px;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    overflow: hidden;
}

/* HEADER */
.header {
    padding: 18px 20px;
    border-bottom: 1px solid #e5e5e5;
}

.title {
    font-size: 15px;
    font-weight: 500;
    color: #111;
    letter-spacing: 0.5px;
}

/* CONTENIDO */
.content {
    padding: 20px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    font-weight: 500;
    color: #999;
    font-size: 12px;
    padding-bottom: 10px;
    letter-spacing: 1px;
}

td {
    padding: 16px 8px;
    vertical-align: top;
    border-bottom: 1px solid #f0f0f0;
    transition: 0.2s;
}

/* HOVER SUTIL */
tr:hover td {
    background: #fafafa;
}

/* DÍA */
td:first-child {
    width: 120px;
    font-weight: 500;
    color: #111;
}

/* ITEM */
.item {
    margin-bottom: 8px;
}

/* BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 14px;
    color: #111;
}

/* ICONO */
.badge img {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    opacity: 0.7;
}

/* LÍNEA IZQUIERDA TIPO TESLA */
.handball {
    border-left: 2px solid #111;
    padding-left: 10px;
}

.clase {
    border-left: 2px solid #666;
    padding-left: 10px;
}

.profe {
    border-left: 2px solid #ccc;
    padding-left: 10px;
}

/* HORA */
.hora {
    display: block;
    margin-left: 26px;
    font-size: 12px;
    color: #777;
    margin-top: 2px;
}
</style>
</head>

<body>

<div class="window">

    <div class="header">
        <div class="title">Agenda</div>
    </div>

    <div class="content">
        <table>
            <tr>
                <th>Día</th>
                <th>Actividades</th>
            </tr>

            <tr>
                <td>Lunes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Clase: Historia de las Ideas
                        </span>
                        <span class="hora">20:10 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Martes</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe de Handball
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Miércoles</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">19:00 – 20:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Clase: UDI
                        </span>
                        <span class="hora">21:00 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Jueves</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe de Handball
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Viernes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                </td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
