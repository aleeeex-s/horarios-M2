<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda Dashboard</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: "Segoe UI", monospace;
    background: #0a0f1c;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e5e7eb;
}

/* GRID PRINCIPAL */
.dashboard {
    width: 900px;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 15px;
}

/* PANEL BASE */
.panel {
    background: #020617;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 15px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}

/* TITULOS */
.panel-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: #64748b;
    margin-bottom: 10px;
}

/* PANEL IZQUIERDO (DÍAS) */
.days .day {
    padding: 10px;
    border-bottom: 1px solid #1e293b;
    cursor: pointer;
    transition: 0.2s;
}

.days .day:hover {
    background: #0f172a;
}

.day.active {
    color: #38bdf8;
}

/* PANEL DERECHO (ACTIVIDADES) */
.activity {
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid #1e293b;
    border-radius: 8px;
    background: #020617;
    transition: 0.2s;
}

.activity:hover {
    border-color: #38bdf8;
    box-shadow: 0 0 10px rgba(56,189,248,0.3);
}

/* HEADER ACTIVIDAD */
.activity-title {
    font-size: 13px;
    margin-bottom: 4px;
}

/* HORA */
.activity-time {
    font-size: 11px;
    color: #94a3b8;
}

/* INDICADOR */
.indicator {
    width: 6px;
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
    border-radius: 6px 0 0 6px;
}

.activity-wrapper {
    position: relative;
}

/* COLORES */
.handball { background: #3b82f6; }
.clase { background: #22c55e; }
.profe { background: #e5e7eb; }

/* PANEL SUPERIOR */
.status {
    grid-column: span 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status-box {
    background: #020617;
    border: 1px solid #1e293b;
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 12px;
}

/* TEXTO DESTACADO */
.highlight {
    color: #38bdf8;
    font-weight: 500;
}
</style>
</head>

<body>

<div class="dashboard">

    <!-- ESTADO SUPERIOR -->
    <div class="panel status">
        <div class="status-box">SYSTEM: <span class="highlight">ACTIVE</span></div>
        <div class="status-box">MODE: <span class="highlight">WEEKLY SCHEDULE</span></div>
        <div class="status-box">USER: <span class="highlight">ALEX</span></div>
    </div>

    <!-- PANEL IZQUIERDO -->
    <div class="panel days">
        <div class="panel-title">DAYS</div>

        <div class="day active">Lunes</div>
        <div class="day">Martes</div>
        <div class="day">Miércoles</div>
        <div class="day">Jueves</div>
        <div class="day">Viernes</div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel">
        <div class="panel-title">ACTIVITIES</div>

        <!-- ACTIVIDAD -->
        <div class="activity-wrapper">
            <div class="indicator handball"></div>
            <div class="activity">
                <div class="activity-title">Prácticas Handball - ESTADIO</div>
                <div class="activity-time">16:00 – 17:30</div>
            </div>
        </div>

        <div class="activity-wrapper">
            <div class="indicator clase"></div>
            <div class="activity">
                <div class="activity-title">Historia de las Ideas</div>
                <div class="activity-time">20:10 – 23:00</div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
