<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    /* FONDO MÁS VIVO */
    background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR VIDRIO */
.window {
    width: 700px;
    border-radius: 20px;
    overflow: hidden;

    /* EFECTO GLASS */
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.1);

    box-shadow:
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.08);
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 12px;

    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* DOTS */
.dots {
    display: flex;
    gap: 8px;
    margin-right: 10px;
}

.dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red { background: #ff5f57; }
.yellow { background: #febc2e; }
.green { background: #28c840; }

.title {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
}

/* CONTENT */
.content {
    padding: 20px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
    color: rgba(255,255,255,0.85);
}

th {
    text-align: left;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    padding-bottom: 10px;
}

/* FILAS */
td {
    padding: 12px 8px;
    vertical-align: top;
    transition: 0.2s;
}

tr:hover td {
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
}

/* DÍA */
td:first-child {
    color: rgba(255,255,255,0.4);
    width: 120px;
    font-weight: 500;
}

/* ITEM */
.item {
    margin-bottom: 8px;
}

/* BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 13px;

    backdrop-filter: blur(10px);
}

/* LOGO */
.badge img {
    width: 16px;
    height: 16px;
    border-radius: 4px;
}

/* COLORES GLASS */
.handball {
    background: rgba(37, 99, 235, 0.3);
    border: 1px solid rgba(37, 99, 235, 0.4);
}

.clase {
    background: rgba(22, 163, 74, 0.3);
    border: 1px solid rgba(22, 163, 74, 0.4);
}

.profe {
    background: rgba(255,255,255,0.8);
    color: black;
}

/* HORA */
.hora {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-left: 6px;
}

</style>
</head>

<body>

<div class="window">

    <div class="header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="title">Agenda</div>
    </div>

    <div class="content">
        <table>
            <tr>
                <th>Día</th>
                <th>Actividades</th>
            </tr>

            <tr>
                <td>Lunes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Clase: Historia de las Ideas
                        </span>
                        <span class="hora">20:10 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Martes</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe de Handball
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Miércoles</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">19:00 – 20:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Clase: UDI
                        </span>
                        <span class="hora">21:00 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Jueves</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe de Handball
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Viernes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                </td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
