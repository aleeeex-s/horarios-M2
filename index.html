<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: "Segoe UI", -apple-system, sans-serif;
    background: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTENEDOR */
.window {
    width: 700px;
    border-radius: 12px;
    overflow: hidden;
    background: #181818;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: #000;
    border-bottom: 1px solid #282828;
}

.title {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
}

/* CONTENIDO */
.content {
    padding: 20px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
    color: #b3b3b3;
}

th {
    text-align: left;
    font-weight: 500;
    color: #b3b3b3;
    padding-bottom: 12px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

td {
    padding: 14px 8px;
    vertical-align: top;
    transition: background 0.2s;
}

/* FILA HOVER */
tr:hover td {
    background: #282828;
}

/* DÍA */
td:first-child {
    width: 120px;
    color: #fff;
    font-weight: 600;
}

/* ITEM */
.item {
    margin-bottom: 10px;
}

/* BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    background: #282828;
    color: #fff;
    transition: all 0.2s ease;
}

/* ICONO */
.badge img {
    width: 16px;
    height: 16px;
    border-radius: 3px;
}

/* HOVER BADGE */
.badge:hover {
    background: #1db954;
    color: #000;
    transform: scale(1.04);
}

/* COLORES ESPECIALES */
.handball {
    border: 1px solid #1db954;
}

.clase {
    border: 1px solid #535353;
}

.profe {
    background: #fff;
    color: #000;
}

/* HORA */
.hora {
    color: #b3b3b3;
    font-size: 12px;
    margin-left: 10px;
}

/* RESALTAR HORA EN HOVER */
tr:hover .hora {
    color: #fff;
}
</style>
</head>

<body>

<div class="window">

    <div class="header">
        <div class="title">Agenda</div>
    </div>

    <div class="content">
        <table>
            <tr>
                <th>Día</th>
                <th>Actividades</th>
            </tr>

            <tr>
                <td>Lunes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Clase: Historia de las Ideas
                        </span>
                        <span class="hora">20:10 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Martes</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe de Handball
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Miércoles</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">19:00 – 20:30</span>
                    </div>
                    <div class="item">
                        <span class="badge clase">
                            <img src="clases.png">
                            Clase: UDI
                        </span>
                        <span class="hora">21:00 – 23:00</span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Jueves</td>
                <td>
                    <div class="item">
                        <span class="badge profe">
                            <img src="handballprofe.jpg">
                            Profe de Handball
                        </span>
                    </div>
                </td>
            </tr>

            <tr>
                <td>Viernes</td>
                <td>
                    <div class="item">
                        <span class="badge handball">
                            <img src="handball.png">
                            Prácticas Handball - ESTADIO
                        </span>
                        <span class="hora">16:00 – 17:30</span>
                    </div>
                </td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
