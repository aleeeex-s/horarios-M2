<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda HUD</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at center, #020617, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e2e8f0;
}

/* CONTENEDOR */
.window {
    width: 750px;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 12px;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    box-shadow:
        0 0 20px rgba(0,255,255,0.2),
        inset 0 0 20px rgba(0,255,255,0.05);
    position: relative;
}

/* ESQUINAS RECORTADAS */
.window::before,
.window::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid rgba(0,255,255,0.4);
}

.window::before {
    top: -2px;
    left: -2px;
    border-right: none;
    border-bottom: none;
}

.window::after {
    bottom: -2px;
    right: -2px;
    border-left: none;
    border-top: none;
}

/* HEADER */
.header {
    font-size: 14px;
    letter-spacing: 2px;
    color: #22d3ee;
    margin-bottom: 15px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    font-size: 11px;
    color: #64748b;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(0,255,255,0.2);
}

td {
    padding: 12px 8px;
    vertical-align: top;
    border-bottom: 1px solid rgba(0,255,255,0.05);
}

/* FILA HOVER */
tr:hover td {
    background: rgba(0,255,255,0.05);
}

/* DÍA */
td:first-child {
    width: 120px;
    color: #22d3ee;
    font-weight: 500;
}

/* ITEM */
.item {
    margin-bottom: 8px;
}

/* BADGE */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    font-size: 12px;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 6px;
    background: rgba(0,255,255,0.05);
    position: relative;
    overflow: hidden;
    transition: 0.25s;
}

/* EFECTO ESCANEO */
.badge::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,255,0.3), transparent);
    animation: scan 4s linear infinite;
}

@keyframes scan {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* ICONO */
.badge img {
    width: 14px;
    height: 14px;
}

/* COLORES */
.handball { border-color: #38bdf8; }
.clase { border-color: #22c55e; }
.profe { border-color: #e5e7eb; }

/* HOVER BADGE */
.badge:hover {
    box-shadow: 0 0 10px rgba(0,255,255,0.6);
    transform: scale(1.05);
}

/* HORA */
.hora {
    font-size: 11px;
    color: #94a3b8;
    margin-left: 6px;
}
</style>
</head>

<body>

<div class="window">

    <div class="header">AGENDA SYSTEM</div>

    <table>
        <tr>
            <th>DÍA</th>
            <th>ACTIVIDADES</th>
        </tr>

        <tr>
            <td>Lunes</td>
            <td>
                <div class="item">
                    <span class="badge handball">
                        <img src="handball.png">
                        Handball - ESTADIO
                    </span>
                    <span class="hora">16:00 – 17:30</span>
                </div>
                <div class="item">
                    <span class="badge clase">
                        <img src="clases.png">
                        Historia de las Ideas
                    </span>
                    <span class="hora">20:10 – 23:00</span>
                </div>
            </td>
        </tr>

        <tr>
            <td>Martes</td>
            <td>
                <div class="item">
                    <span class="badge profe">
                        <img src="handballprofe.jpg">
                        Profe de Handball
                    </span>
                </div>
            </td>
        </tr>

        <tr>
            <td>Miércoles</td>
            <td>
                <div class="item">
                    <span class="badge handball">
                        <img src="handball.png">
                        Handball - ESTADIO
                    </span>
                    <span class="hora">19:00 – 20:30</span>
                </div>
                <div class="item">
                    <span class="badge clase">
                        <img src="clases.png">
                        UDI
                    </span>
                    <span class="hora">21:00 – 23:00</span>
                </div>
            </td>
        </tr>

        <tr>
            <td>Jueves</td>
            <td>
                <div class="item">
                    <span class="badge profe">
                        <img src="handballprofe.jpg">
                        Profe de Handball
                    </span>
                </div>
            </td>
        </tr>

        <tr>
            <td>Viernes</td>
            <td>
                <div class="item">
                    <span class="badge handball">
                        <img src="handball.png">
                        Handball - ESTADIO
                    </span>
                    <span class="hora">16:00 – 17:30</span>
                </div>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
